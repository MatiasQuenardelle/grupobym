<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF8FF"/>
      <stop offset="100%" style="stop-color:#F7FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AADE0"/>
      <stop offset="100%" style="stop-color:#2080B0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="880" cy="300" r="200" fill="url(#accent)" opacity="0.06"/>
  <circle cx="150" cy="480" r="130" fill="#3AADE0" opacity="0.04"/>
  <!-- Shield / protection icon -->
  <g transform="translate(710, 170)" opacity="0.2">
    <path d="M60 10 L110 30 L110 80 C110 120, 60 150, 60 150 C60 150, 10 120, 10 80 L10 30 Z" fill="none" stroke="#3AADE0" stroke-width="4"/>
    <path d="M40 80 L55 95 L85 65" stroke="#2080B0" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Document / receipt -->
  <g transform="translate(230, 200)" opacity="0.12">
    <rect x="0" y="0" width="90" height="120" rx="8" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <line x1="20" y1="30" x2="70" y2="30" stroke="#3AADE0" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="70" y2="50" stroke="#3AADE0" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="50" y2="70" stroke="#3AADE0" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="90" x2="70" y2="90" stroke="#2080B0" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Coins stack -->
  <g transform="translate(870, 350)" opacity="0.12">
    <ellipse cx="35" cy="60" rx="35" ry="12" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <ellipse cx="35" cy="45" rx="35" ry="12" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <ellipse cx="35" cy="30" rx="35" ry="12" fill="none" stroke="#3AADE0" stroke-width="3"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.1">
    <circle cx="100" cy="80" r="4"/><circle cx="120" cy="80" r="4"/><circle cx="140" cy="80" r="4"/>
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
