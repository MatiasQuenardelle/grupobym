      <stop offset="0%" style="stop-color:#F0FFF4"/>
      <stop offset="100%" style="stop-color:#EBF8FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48BB78"/>
      <stop offset="100%" style="stop-color:#38A169"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="320" r="210" fill="url(#accent)" opacity="0.06"/>
  <circle cx="300" cy="150" r="100" fill="#48BB78" opacity="0.05"/>
