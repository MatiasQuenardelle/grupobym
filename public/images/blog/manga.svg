<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF8FF"/>
      <stop offset="100%" style="stop-color:#D1EEFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AADE0"/>
      <stop offset="100%" style="stop-color:#186590"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="880" cy="310" r="200" fill="url(#accent)" opacity="0.07"/>
  <circle cx="940" cy="270" r="140" fill="url(#accent)" opacity="0.05"/>
  <!-- Sleeve/tube stomach shape -->
  <g transform="translate(500, 120)" opacity="0.3">
    <path d="M60 20 C70 20, 80 30, 80 50 L80 250 C80 270, 70 280, 60 280 C50 280, 40 270, 40 250 L40 50 C40 30, 50 20, 60 20Z" fill="#3AADE0" opacity="0.15" stroke="#3AADE0" stroke-width="3"/>
    <!-- Dotted line showing removed portion -->
    <path d="M80 50 C120 60, 150 100, 150 150 C150 200, 130 240, 100 260" fill="none" stroke="#186590" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
    <text x="130" y="155" font-family="sans-serif" font-size="11" fill="#186590" opacity="0.5">80%</text>
    <!-- Arrow showing reduction -->
    <path d="M120 100 L95 80" fill="none" stroke="#3AADE0" stroke-width="2" stroke-linecap="round"/>
    <polygon points="97,83 90,76 100,78" fill="#3AADE0" opacity="0.6"/>
  </g>
  <!-- Ghrelin molecule symbol -->
  <g transform="translate(730, 180)" opacity="0.15">
    <circle cx="30" cy="30" r="12" fill="none" stroke="#186590" stroke-width="2"/>
    <circle cx="60" cy="20" r="8" fill="none" stroke="#186590" stroke-width="2"/>
    <circle cx="50" cy="55" r="10" fill="none" stroke="#186590" stroke-width="2"/>
    <line x1="40" y1="25" x2="54" y2="22" stroke="#186590" stroke-width="2"/>
    <line x1="38" y1="38" x2="45" y2="48" stroke="#186590" stroke-width="2"/>
    <!-- X mark over it -->
    <line x1="15" y1="10" x2="75" y2="65" stroke="#3AADE0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="75" y1="10" x2="15" y2="65" stroke="#3AADE0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.12">
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="100" cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="140" cy="120" r="4"/>
    <circle cx="100" cy="140" r="4"/><circle cx="120" cy="140" r="4"/><circle cx="140" cy="140" r="4"/>
    <circle cx="1060" cy="490" r="4"/><circle cx="1080" cy="490" r="4"/><circle cx="1100" cy="490" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(200, 400)" opacity="0.15">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <path d="M18 30 L26 38 L42 22" fill="none" stroke="#3AADE0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
