<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF8FF"/>
      <stop offset="100%" style="stop-color:#D1EEFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AADE0"/>
      <stop offset="100%" style="stop-color:#186590"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="850" cy="300" r="220" fill="url(#accent)" opacity="0.07"/>
  <circle cx="920" cy="260" r="150" fill="url(#accent)" opacity="0.05"/>
  <!-- Stomach with bypass path -->
  <g transform="translate(480, 140)" opacity="0.3">
    <path d="M100 20 C140 20, 170 50, 170 90 C170 140, 140 180, 120 220 C100 260, 80 280, 80 300" fill="none" stroke="#3AADE0" stroke-width="4" stroke-linecap="round"/>
    <path d="M100 20 C60 20, 30 50, 30 90 C30 120, 50 130, 60 130" fill="none" stroke="#186590" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4"/>
    <circle cx="100" cy="20" r="8" fill="#3AADE0" opacity="0.4"/>
    <circle cx="60" cy="130" r="6" fill="#186590" opacity="0.4"/>
    <!-- Arrow showing bypass route -->
    <path d="M60 130 C80 160, 100 200, 120 220" fill="none" stroke="#3AADE0" stroke-width="3" stroke-dasharray="6 3" stroke-linecap="round"/>
    <polygon points="118,215 125,225 115,225" fill="#3AADE0" opacity="0.6"/>
  </g>
  <!-- Heart symbol -->
  <g transform="translate(750, 200)" opacity="0.15">
    <path d="M40 20 C40 5, 60 0, 60 18 C60 0, 80 5, 80 20 C80 40, 60 55, 60 55 C60 55, 40 40, 40 20Z" fill="#3AADE0"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.12">
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="100" cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="140" cy="120" r="4"/>
    <circle cx="100" cy="140" r="4"/><circle cx="120" cy="140" r="4"/><circle cx="140" cy="140" r="4"/>
    <circle cx="1060" cy="490" r="4"/><circle cx="1080" cy="490" r="4"/><circle cx="1100" cy="490" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
  <!-- Medical cross -->
  <g transform="translate(180, 380)" opacity="0.12">
    <rect x="25" y="0" width="30" height="80" rx="5" fill="#3AADE0"/>
    <rect x="0" y="25" width="80" height="30" rx="5" fill="#3AADE0"/>
  </g>
  <!-- Scale/weight symbol -->
  <g transform="translate(850, 380)" opacity="0.15">
    <rect x="30" y="60" width="40" height="6" rx="3" fill="#186590"/>
    <rect x="47" y="20" width="6" height="40" rx="3" fill="#186590"/>
    <path d="M20 20 L50 20" stroke="#186590" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 20 L80 20" stroke="#186590" stroke-width="4" stroke-linecap="round"/>
    <path d="M20 20 L15 40 L35 40 Z" fill="#186590" opacity="0.4"/>
    <path d="M80 20 L75 40 L95 40 Z" fill="#186590" opacity="0.4"/>
  </g>
</svg>
