<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9E6"/>
      <stop offset="100%" style="stop-color:#EBF8FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD966"/>
      <stop offset="100%" style="stop-color:#3AADE0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="300" r="200" fill="url(#accent)" opacity="0.07"/>
  <circle cx="200" cy="450" r="120" fill="#FFD966" opacity="0.08"/>
  <!-- Sun / renewal symbol -->
  <g transform="translate(700, 200)" opacity="0.18">
    <circle cx="60" cy="60" r="30" fill="#FFD966"/>
    <g stroke="#FFD966" stroke-width="3" stroke-linecap="round">
      <line x1="60" y1="15" x2="60" y2="0"/>
      <line x1="60" y1="120" x2="60" y2="105"/>
      <line x1="15" y1="60" x2="0" y2="60"/>
      <line x1="120" y1="60" x2="105" y2="60"/>
      <line x1="28" y1="28" x2="18" y2="18"/>
      <line x1="92" y1="92" x2="102" y2="102"/>
      <line x1="28" y1="92" x2="18" y2="102"/>
      <line x1="92" y1="28" x2="102" y2="18"/>
    </g>
  </g>
  <!-- Person walking / active -->
  <g transform="translate(850, 250)" opacity="0.15">
    <circle cx="30" cy="10" r="10" fill="#3AADE0"/>
    <path d="M30 20 L30 55 M30 35 L15 50 M30 35 L45 50 M30 55 L15 80 M30 55 L45 80" stroke="#3AADE0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Upward arrow / progress -->
  <g transform="translate(250, 180)" opacity="0.12">
    <path d="M40 120 L40 20 M20 45 L40 20 L60 45" stroke="#3AADE0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.1">
    <circle cx="100" cy="80" r="4"/><circle cx="120" cy="80" r="4"/><circle cx="140" cy="80" r="4"/>
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
</svg>