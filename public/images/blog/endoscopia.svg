<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF8FF"/>
      <stop offset="100%" style="stop-color:#D1EEFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AADE0"/>
      <stop offset="100%" style="stop-color:#186590"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="870" cy="300" r="200" fill="url(#accent)" opacity="0.07"/>
  <circle cx="930" cy="260" r="140" fill="url(#accent)" opacity="0.05"/>
  <!-- Endoscope -->
  <g transform="translate(460, 140)" opacity="0.3">
    <path d="M40 20 C40 20, 60 20, 60 40 L60 140 C60 180, 80 200, 100 220 C120 240, 130 260, 120 280" fill="none" stroke="#3AADE0" stroke-width="4" stroke-linecap="round"/>
    <!-- Camera/light at tip -->
    <circle cx="120" cy="285" r="12" fill="#3AADE0" opacity="0.2" stroke="#3AADE0" stroke-width="2"/>
    <circle cx="120" cy="285" r="5" fill="#3AADE0" opacity="0.4"/>
    <!-- Handle -->
    <rect x="25" y="8" width="40" height="20" rx="6" fill="none" stroke="#186590" stroke-width="3"/>
    <circle cx="35" cy="18" r="3" fill="#186590" opacity="0.5"/>
    <circle cx="55" cy="18" r="3" fill="#186590" opacity="0.5"/>
  </g>
  <!-- Monitor/screen -->
  <g transform="translate(700, 180)" opacity="0.2">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="none" stroke="#186590" stroke-width="3"/>
    <rect x="50" y="100" width="40" height="15" rx="2" fill="#186590" opacity="0.3"/>
    <rect x="30" y="115" width="80" height="4" rx="2" fill="#186590" opacity="0.3"/>
    <!-- Screen content wave -->
    <path d="M20 50 C40 30, 60 70, 80 50 C100 30, 120 60, 120 50" fill="none" stroke="#3AADE0" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.12">
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="100" cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="140" cy="120" r="4"/>
    <circle cx="100" cy="140" r="4"/><circle cx="120" cy="140" r="4"/><circle cx="140" cy="140" r="4"/>
    <circle cx="1060" cy="490" r="4"/><circle cx="1080" cy="490" r="4"/><circle cx="1100" cy="490" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
  <!-- Magnifying glass -->
  <g transform="translate(200, 380)" opacity="0.15">
    <circle cx="30" cy="30" r="22" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <line x1="46" y1="46" x2="65" y2="65" stroke="#3AADE0" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
