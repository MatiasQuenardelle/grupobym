<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF8FF"/>
      <stop offset="100%" style="stop-color:#E6F6FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AADE0"/>
      <stop offset="100%" style="stop-color:#186590"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="880" cy="310" r="210" fill="url(#accent)" opacity="0.06"/>
  <circle cx="250" cy="150" r="100" fill="#3AADE0" opacity="0.04"/>
  <!-- Globe -->
  <g transform="translate(690, 170)" opacity="0.2">
    <circle cx="70" cy="70" r="65" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <ellipse cx="70" cy="70" rx="30" ry="65" fill="none" stroke="#3AADE0" stroke-width="2"/>
    <line x1="5" y1="70" x2="135" y2="70" stroke="#3AADE0" stroke-width="2"/>
    <path d="M15 40 Q70 30, 125 40" fill="none" stroke="#3AADE0" stroke-width="2"/>
    <path d="M15 100 Q70 110, 125 100" fill="none" stroke="#3AADE0" stroke-width="2"/>
  </g>
  <!-- Airplane -->
  <g transform="translate(850, 200)" opacity="0.15">
    <path d="M10 50 L50 35 L40 30 L70 20 L45 40 L55 38 L15 55 Z" fill="#186590"/>
  </g>
  <!-- Location pin -->
  <g transform="translate(240, 280)" opacity="0.12">
    <path d="M40 10 C20 10, 5 25, 5 45 C5 70, 40 100, 40 100 C40 100, 75 70, 75 45 C75 25, 60 10, 40 10Z" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <circle cx="40" cy="42" r="12" fill="none" stroke="#3AADE0" stroke-width="3"/>
    <!-- Cross inside pin -->
    <line x1="40" y1="34" x2="40" y2="50" stroke="#3AADE0" stroke-width="2.5"/>
    <line x1="32" y1="42" x2="48" y2="42" stroke="#3AADE0" stroke-width="2.5"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#3AADE0" opacity="0.1">
    <circle cx="100" cy="80" r="4"/><circle cx="120" cy="80" r="4"/><circle cx="140" cy="80" r="4"/>
    <circle cx="100" cy="100" r="4"/><circle cx="120" cy="100" r="4"/><circle cx="140" cy="100" r="4"/>
    <circle cx="1060" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1100" cy="510" r="4"/>
    <circle cx="1060" cy="530" r="4"/><circle cx="1080" cy="530" r="4"/><circle cx="1100" cy="530" r="4"/>
  </g>
